# Get editor completions based on the config schema
#"$schema" = 'https://starship.rs/config-schema.json'

# Symbols reference https://www.nerdfonts.com/cheat-sheet
# e0b4 оӮҙ, e0ba оӮә, e0bc оӮј, e0b0 оӮ°, e691 оҡ‘, # f007 пҖҮ, f07c пҒј, e0a0 оӮ , f017 пҖ—, f075a у°қҡ

# Blue
#3B237A #FFFFFF
#33658A #FFFFFF
#86BBD8 #000000
#ABABAB #000000
#B497FF

format = """
$username\
[оӮҙ](bg:#33658A fg:#3B237A)\
$directory\
[оӮҙ](bg:#86BBD8 fg:#33658A)\
[ оӮ ](fg:#000000 bg:#86BBD8)\
$git_branch\
$git_status\
[оӮҙ](fg:#86BBD8 bg:#ABABAB)\
$time\
[оӮҙ](fg:#ABABAB)
[>](fg:#B497FF) 
"""

command_timeout = 750

# Disable the blank line at the start of the prompt
# add_newline = true

# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "fg:#ffffff bg:#3B237A"
style_root = "fg:#ffffff bg:#3B237A"
format = "[ пҖҮ $user ]($style)"

[directory]
style = "fg:#ffffff bg:#33658A"
format = "[ пҒј $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "рҹ“„ "
"Downloads" = "рҹ“Ҙ "
"Music" = "у°қҡ "
"Pictures" = "рҹ“· "
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[git_branch]
style = "fg:#000000 bg:#86BBD8"
format = '[[ $branch ](fg:#000000 bg:#86BBD8)]($style)'

[git_status]
style = "fg:#000000 bg:#86BBD8"
format = '[[($all_status$ahead_behind )](bg:#86BBD8 fg:#000000)]($style)'

[time]
disabled = false
time_format = "%T CW%V" # Hour:Minute:Second CalendarWeek
style = "fg:#000000 bg:#ABABAB"
format = '[[ пҖ— $time ](fg:#000000 bg:#ABABAB)]($style)'