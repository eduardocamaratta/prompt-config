# Get editor completions based on the config schema
# "$schema" = 'https://starship.rs/config-schema.json'

# Symbols used (https://www.nerdfonts.com/cheat-sheet)
# e0b4 оВі, e0ba оВЇ, e0bc оВЉ, e0b0 оВ∞, e691 оЪС, # f007 пАЗ, f07c пБЉ, e0a0 оВ†, f017 пАЧ, f00ed у∞Г≠, e0c6 оГЖ, f075a у∞ЭЪ

# Hints
# * When a string is enclosed by parenthesis, it doesn't render if all variables inside are None or empty
# * prev_bg and prev_fg are valid values for colors

# Pastel
#903284 #FFFFFF
#D65B71 #FFFFFF
#F0986F #000000
#7AB2D3 #000000
#2C597F #FFFFFF
#D0D0D0

# Blue
#3B237A #FFFFFF
#33658A #FFFFFF
#86BBD8 #000000
#ABABAB #000000
#B497FF

# Rainbow
#064A74 #FFFFFF
#7E1014 #FFFFFF
#B30020 #FFFFFF
#DD962C #000000
#FAD300 #000000
#00D000

# Optional first section
#[ оЪС ](fg:#FFFFFF bg:#903284)\
#[оВЉ](fg:prev_bg bg:#D65B71)$username\

format = """
$username\
[оВЉ](fg:prev_bg bg:#F0986F)$directory\
([оВЉ](fg:prev_bg bg:#7AB2D3)$git_branch$git_status)\
[оВЉ](fg:prev_bg bg:#2C597F)$time
[>](fg:#D0D0D0) 
"""

command_timeout = 750

add_newline = true

# You can also replace your username with a neat symbol like пД† to save some space
[username]
show_always = true
style_user = "fg:#FFFFFF bg:#D65B71"
style_root = "fg:#FFFFFF bg:#D65B71"
format = "[ пАЗ $user ]($style)"

[directory]
truncation_length = 3
truncation_symbol = "вА¶/"
style = "fg:#000000 bg:#F0986F"
format = "[ пБЉ $path ]($style)"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "рЯУД "
"Downloads" = "рЯУ• "
"Music" = "у∞ЭЪ "
"Pictures" = "рЯУЈ "

[git_branch]
style = "fg:#000000 bg:#7AB2D3"
format = "[ оВ† $branch ]($style)"

[git_status]
style = "fg:#000000 bg:#7AB2D3"
format = '[$all_status$ahead_behind ]($style)'

[time]
disabled = false
time_format = "%T у∞Г≠ CW%V" # Hour:Minute:Second оЉЄ CalendarWeek
style = "fg:#FFFFFF bg:#2C597F"
format = "[ пАЧ $time [оВЉ](#2C597F)]($style)"